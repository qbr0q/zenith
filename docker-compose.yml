version: '3.8'

services:
  # --- БАЗА ДАННЫХ ---
  db:
    image: postgres:17
    environment:
      - TZ=Europe/Moscow
      - POSTGRES_USER=${DB__USER}
      - POSTGRES_PASSWORD=${DB__PASSWORD}
      - POSTGRES_DB=${DB__NAME}
    container_name: zenith_db
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  # --- РЕДИС ---
  redis:
    image: redis:7-alpine
    container_name: zenith_redis
    restart: always
    ports:
      - "6379:6379"

  # --- БЭКЕНД ---
  backend:
    build: ./backend
    container_name: zenith_backend
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app/media:/app/app/media
    environment:
      - TZ=Europe/Moscow
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"

  # --- БОТЫ ---
  bot_service:
    build:
      context: ./backend
      dockerfile: app/bot_service/Dockerfile
    container_name: zenith_bots
    environment:
      - API_URL=http://backend:8080/api
    env_file:
      - ./backend/.env
    restart: always
    depends_on:
      - backend
    profiles:
      - bots

  # --- ФРОНТЕНД ---
  frontend:
    build: ./frontend
    container_name: zenith_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  # --- Воркер TaskIq ---
  worker:
    build:
      context: ./backend
      dockerfile: app/task_redis/Dockerfile
    environment:
      - TZ=Europe/Moscow
      - PYTHONUNBUFFERED=1
      - TASKIQ_LOG_LEVEL=DEBUG
#    container_name: taskiq_worker -- уникализация наименования контейнера
    command: taskiq worker app.task_redis.tk:broker
    depends_on:
      - redis
      - db
    env_file: ./backend/.env

volumes:
  postgres_data: